<mat-toolbar color="primary" class="toolbar">
  <a mat-button routerLink="/customer/menu">Restaurant</a>
  <span class="spacer"></span>
  <a mat-icon-button routerLink="/customer/cart" aria-label="Cart">
    <mat-icon [matBadge]="cart.totalItems()" [matBadgeHidden]="cart.totalItems() === 0" matBadgeColor="accent">shopping_cart</mat-icon>
  </a>
  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <span mat-menu-item disabled>{{ auth.currentUser()?.name }}</span>
    <a mat-menu-item routerLink="/customer/orders">
      <mat-icon>history</mat-icon>
      <span>My Orders</span>
    </a>
    <button mat-menu-item (click)="auth.logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
<main class="content">
  <router-outlet />
</main>

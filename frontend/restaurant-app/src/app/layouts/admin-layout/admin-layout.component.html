<mat-toolbar color="primary" class="toolbar">
  <button mat-icon-button (click)="drawer.toggle()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Restaurant Admin</span>
  <span class="spacer"></span>
  <span class="user">{{ auth.currentUser()?.name }}</span>
  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="auth.logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
<mat-sidenav-container class="container">
  <mat-sidenav #drawer mode="side" opened class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        Dashboard
      </a>
      <a mat-list-item routerLink="/admin/menu" routerLinkActive="active">
        <mat-icon>restaurant_menu</mat-icon>
        Menu
      </a>
      <a mat-list-item routerLink="/admin/orders" routerLinkActive="active">
        <mat-icon>receipt_long</mat-icon>
        Orders
      </a>
      <a mat-list-item routerLink="/admin/customers" routerLinkActive="active">
        <mat-icon>people</mat-icon>
        Customers
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>

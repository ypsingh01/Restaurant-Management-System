<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>{{ role === 'admin' ? 'Admin' : 'Customer' }} Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
          <mat-error>Valid email is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" />
          <mat-error>At least 6 characters</mat-error>
        </mat-form-field>
        <button mat-flat-button color="primary" type="submit" class="full-width" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="24" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loading">Login</span>
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button routerLink="/">Back</a>
      <a mat-button [routerLink]="['/register', role]">Register</a>
    </mat-card-actions>
  </mat-card>
</div>

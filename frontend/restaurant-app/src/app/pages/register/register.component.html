<div class="register-page">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>{{ role === 'admin' ? 'Admin' : 'Customer' }} Register</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
          <mat-error>Name is required (min 2 characters)</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
          <mat-error>Valid email is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" />
          <mat-error>At least 6 characters</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width" *ngIf="role === 'customer'">
          <mat-label>Phone (optional)</mat-label>
          <input matInput formControlName="phone" type="tel" />
        </mat-form-field>
        <button mat-flat-button color="primary" type="submit" class="full-width" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="24" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loading">Register</span>
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button routerLink="/">Back</a>
      <a mat-button [routerLink]="['/login', role]">Already have an account?</a>
    </mat-card-actions>
  </mat-card>
</div>

<div class="page">
  <h1>Menu</h1>
  <p *ngIf="error" class="error">{{ error }}</p>
  <mat-spinner *ngIf="loading" diameter="40" class="center"></mat-spinner>
  <div *ngIf="!loading && items.length === 0" class="empty">No menu items available.</div>
  <div *ngIf="!loading && items.length" class="grid">
    <mat-card *ngFor="let item of items" class="item-card">
      <mat-card-header>
        <mat-card-title>{{ item.name }}</mat-card-title>
        <mat-card-subtitle>{{ item.category }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="price">{{ item.price | currency }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-flat-button color="primary" [disabled]="!item.isAvailable" (click)="addToCart(item)">
          <mat-icon>add_shopping_cart</mat-icon>
          {{ item.isAvailable ? 'Add to cart' : 'Unavailable' }}
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>

<div class="page">
  <h1>Orders</h1>
  <mat-card>
    <mat-card-content>
      <mat-spinner *ngIf="loading" diameter="36" class="center"></mat-spinner>
      <div *ngIf="!loading && orders.length === 0" class="empty">No orders yet.</div>
      <table *ngIf="!loading && orders.length" mat-table [dataSource]="orders" class="full-width">
        <ng-container matColumnDef="orderId">
          <th mat-header-cell *matHeaderCellDef>Order #</th>
          <td mat-cell *matCellDef="let row">{{ row.orderId }}</td>
        </ng-container>
        <ng-container matColumnDef="customerId">
          <th mat-header-cell *matHeaderCellDef>Customer ID</th>
          <td mat-cell *matCellDef="let row">{{ row.customerId }}</td>
        </ng-container>
        <ng-container matColumnDef="orderDate">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let row">{{ row.orderDate | date: 'short' }}</td>
        </ng-container>
        <ng-container matColumnDef="totalAmount">
          <th mat-header-cell *matHeaderCellDef>Total</th>
          <td mat-cell *matCellDef="let row">{{ row.totalAmount | currency }}</td>
        </ng-container>
        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef>Items</th>
          <td mat-cell *matCellDef="let row">
            <span *ngFor="let i of row.items">{{ i.menuItemName }} x{{ i.quantity }}; </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline" subscriptSizing="dynamic">
              <mat-select [value]="row.status" (selectionChange)="updateStatus(row, $event.value)">
                <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
              </mat-select>
            </mat-form-field>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['orderId', 'customerId', 'orderDate', 'totalAmount', 'items', 'status']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['orderId', 'customerId', 'orderDate', 'totalAmount', 'items', 'status']"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
